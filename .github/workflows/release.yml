name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          V="${VERSION#v}"
          LDFLAGS="-s -w -X go.agentprotocol.cloud/cli/cmd.version=${V}"
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS=${pair%/*} GOARCH=${pair#*/}
            NAME="ap_${V}_${GOOS}_${GOARCH}"
            echo "Building ${NAME}"
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -trimpath -ldflags "$LDFLAGS" -o "dist/${NAME}/ap" .
            tar -czf "dist/${NAME}.tar.gz" -C dist "${NAME}"
            rm -rf "dist/${NAME}"
          done
          cd dist && sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "ap ${{ github.ref_name }}" \
            --generate-notes \
            dist/*.tar.gz dist/checksums.txt
